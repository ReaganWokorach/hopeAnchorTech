<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found — HopeAnchor Tech</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
      background: linear-gradient(160deg, #0D1F3C 0%, #1E3A6E 100%);
      position: relative;
      overflow: hidden;
    }
    .error-page::before {
      content: '';
      position: absolute;
      width: 500px; height: 500px;
      background: #00A99D;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.08;
      top: -100px; right: -100px;
    }
    .error-page::after {
      content: '';
      position: absolute;
      width: 350px; height: 350px;
      background: #F5A623;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.07;
      bottom: -80px; left: -80px;
    }
    .error-content { position: relative; z-index: 1; max-width: 540px; }
    .error-anchor {
      font-size: 80px;
      display: block;
      margin-bottom: 24px;
      animation: float-anchor 3s ease-in-out infinite;
    }
    @keyframes float-anchor {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-14px); }
    }
    .error-code {
      font-family: 'Playfair Display', serif;
      font-size: clamp(96px, 15vw, 160px);
      font-weight: 900;
      line-height: 1;
      color: transparent;
      -webkit-text-stroke: 2px rgba(0,169,157,.5);
      margin-bottom: 8px;
    }
    .error-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(22px, 4vw, 32px);
      color: #ffffff;
      margin-bottom: 16px;
    }
    .error-title em { color: #00CFC3; font-style: italic; }
    .error-verse {
      font-size: 14px;
      color: #F5A623;
      font-family: 'Playfair Display', serif;
      font-style: italic;
      margin-bottom: 12px;
      padding: 0 16px;
      border-left: 3px solid #F5A623;
      text-align: left;
    }
    .error-desc {
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
      color: rgba(255,255,255,.65);
      margin-bottom: 40px;
      line-height: 1.7;
    }
    .error-actions {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .err-btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, #00A99D, #007A72);
      color: white;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 600;
      padding: 14px 32px;
      border-radius: 99px;
      text-decoration: none;
      box-shadow: 0 4px 20px rgba(0,169,157,.35);
      transition: transform .25s, box-shadow .25s;
    }
    .err-btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(0,169,157,.45);
    }
    .err-btn-ghost {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 2px solid rgba(255,255,255,.3);
      color: rgba(255,255,255,.8);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 600;
      padding: 14px 32px;
      border-radius: 99px;
      text-decoration: none;
      transition: background .25s, border-color .25s;
    }
    .err-btn-ghost:hover {
      background: rgba(255,255,255,.1);
      border-color: rgba(255,255,255,.6);
    }
    .error-nav-links {
      display: flex;
      gap: 24px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 48px;
      padding-top: 32px;
      border-top: 1px solid rgba(255,255,255,.1);
    }
    .error-nav-links a {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: rgba(255,255,255,.45);
      text-decoration: none;
      transition: color .2s;
    }
    .error-nav-links a:hover { color: #00CFC3; }
  </style>
</head>
<body>
  <div class="error-page">
    <div class="error-content">
      <span class="error-anchor">⚓</span>
      <div class="error-code">404</div>
      <h1 class="error-title">This page has <em>drifted away</em></h1>
      <p class="error-verse">&ldquo;For I know the plans I have for you…&rdquo; — Jeremiah 29:11</p>
      <p class="error-desc">
        The page you're looking for doesn't exist or may have been moved.
        But don't worry — HopeAnchor Tech has plenty of great places to go.
      </p>
      <div class="error-actions">
        <a href="index.html" class="err-btn-primary">🏠 Back to Home</a>
        <a href="contact.html" class="err-btn-ghost">✉️ Contact Us</a>
      </div>
      <div class="error-nav-links">
        <a href="about.html">About</a>
        <a href="services.html">Services</a>
        <a href="training.html">Training</a>
        <a href="contact.html">Contact</a>
      </div>
    </div>
  </div>
</body>
</html>
