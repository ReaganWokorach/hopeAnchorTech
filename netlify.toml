# ============================================================
# HopeAnchor Tech — netlify.toml
# ============================================================

[build]
  publish = "."

# ============================================================
# REDIRECTS
# ============================================================
[[redirects]]
  from = "/home"
  to   = "/"
  status = 301

# ============================================================
# SECURITY HEADERS
# ============================================================
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"

# ============================================================
# NETLIFY FORMS — Email notifications for BOTH forms
#
# Netlify automatically detects HTML forms with data-netlify="true"
# and saves all submissions to your dashboard.
#
# TO ACTIVATE EMAIL NOTIFICATIONS (one-time setup after deploy):
#
#   STEP 1 — Contact Form:
#     app.netlify.com → Your Site → Site configuration → Forms
#     → Select form "contact" → Notifications → Add notification
#     → Email notification → wokorachreagan5030@gmail.com → Save
#
#   STEP 2 — Enrol Form:
#     Same path → Select form "enrol" → Notifications
#     → Add notification → Email notification
#     → wokorachreagan5030@gmail.com → Save
#
#   You will then receive an instant email every time either
#   form is submitted, showing all field values.
#   Submissions also appear in: Forms tab on your Netlify dashboard.
#
# NOTE: netlify.toml cannot set email addresses directly —
#   Netlify requires the notification email to be set via the
#   dashboard UI (above) for security reasons. The form detection
#   and submission storage is fully automatic from this config.
# ============================================================

[dev]
  command = "npx serve ."
  port    = 8888
