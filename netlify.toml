# ============================================================
# HopeAnchor Tech — netlify.toml
# ============================================================

[build]
  publish = "."

# ============================================================
# REDIRECTS
# ============================================================
[[redirects]]
  from = "/home"
  to   = "/"
  status = 301

# ============================================================
# SECURITY HEADERS
# ============================================================
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"

# ============================================================
# NETLIFY FORMS — Email notification
#
# This configures Netlify to email you every time someone
# submits the contact form.
#
# HOW TO ACTIVATE (one-time setup after first deploy):
#   1. Go to: app.netlify.com → Your Site → Site configuration
#   2. Click: Forms → Form notifications
#   3. Click: "Add notification" → "Email notification"
#   4. Enter your email: wokorachreagan5030@gmail.com
#   5. Select form: "contact"
#   6. Save — you will now receive an instant email alert
#      every time someone submits the form.
#
# ALTERNATIVE (Netlify Zapier/webhook):
#   Use Zapier to connect Netlify Forms → Gmail for richer
#   formatted email alerts with all field values visible.
# ============================================================

[dev]
  command = "npx serve ."
  port    = 8888
